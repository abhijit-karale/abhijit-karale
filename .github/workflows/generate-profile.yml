name: Generate Profile SVGs

on:
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours
  push:
    paths:
      - 'config.yml'
      - 'generator/**'
      - '.github/workflows/generate-profile.yml'
  workflow_dispatch:  # Allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commit counts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate SVGs with real GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m generator.main
        # ❌ NOT: python -m generator.main --demo

      - name: Commit and push updated SVGs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/generated/
          git diff --staged --quiet || git commit -m "chore: update profile SVGs [skip ci]"
          git push
